<h1 class="post-title">
    {{with .Params.H1}}
        {{.}}
    {{else}}
        {{.Title}}
    {{end}}
</h1>
<div class="post-line"></div>
<script>

      // Função de tratamento do evento de scroll que limita a execução
      function handleScrollEvent() {
        // Certifica-se de que a função é executada apenas uma vez
        if (!window.adsbygoogleLoaded) {
            loadAndDisplayAd();
        }
    }

    
    // Função para carregar e exibir o anúncio
    function loadAndDisplayAd() {
        // Verifica se o anúncio já foi carregado para evitar múltiplas cargas
        if (!window.adsbygoogleLoaded) {
            var adScript = document.createElement('script');
            adScript.async = true;
            adScript.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1620683366823925";
            adScript.crossorigin = "anonymous";
            document.head.appendChild(adScript);
    
            adScript.onload = function() {
                (adsbygoogle = window.adsbygoogle || []).push({});
            };
    
            // Marca que os anúncios foram carregados
            window.adsbygoogleLoaded = true;
    
            // Remove o listener de evento para evitar futuras execuções
            document.removeEventListener('scroll', handleScrollEvent, {passive: true});
        }
    }
    
    
    // Adiciona o evento de scroll ao documento
    document.addEventListener('scroll', handleScrollEvent, {passive: true});
    </script>
    
    <div style="min-height: 280px; padding-bottom: 40px;">
        <!-- Espaço reservado para os anúncios -->
        <ins class="adsbygoogle"
            style="display:block"
            data-ad-client="ca-pub-1620683366823925"
            data-ad-slot="2945822418"
            data-ad-format="auto"
            data-full-width-responsive="true"></ins>
    </div>
